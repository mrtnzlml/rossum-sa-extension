<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Rossum SA Extension</title>
  <link href="popup.css" rel="stylesheet" />
</head>
<body>
  <div class="accent-bar"></div>

  <header class="header">
    <div class="brand-badge">SA</div>
    <span class="brand-name">Rossum SA</span>
  </header>

  <button id="masterDataHub" class="action-btn">
    <span>Master Data Hub</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
  </button>

  <div class="divider"></div>

  <section>
    <h3 class="section-title">Rossum</h3>

    <label class="toggle">
      <input type="checkbox" id="schemaAnnotationsEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">Schema IDs</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="resourceIdsEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">Resource IDs</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="expandFormulasEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">Auto-expand formulas</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="expandReasoningFieldsEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">Auto-expand reasoning</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="scrollLockEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">Scroll lock</span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="devFeaturesEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">
        Dev features
        <span class="toggle-hint">devFeaturesEnabled</span>
      </span>
    </label>

    <label class="toggle">
      <input type="checkbox" id="devDebugEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">
        Dev debug
        <span class="toggle-hint">devDebugEnabled</span>
      </span>
    </label>
  </section>

  <div class="divider"></div>

  <section>
    <h3 class="section-title">NetSuite</h3>

    <label class="toggle">
      <input type="checkbox" id="netsuiteFieldNamesEnabled" />
      <span class="toggle-track"></span>
      <span class="toggle-label">Field names</span>
    </label>
  </section>

  <footer class="footer">
    <span class="version">0.17.0</span>
    <a href="https://solutionarchitecthandbook.mrtnzlml.com/" target="_blank" class="handbook-link">
      SA Handbook
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M17 7H7M17 7v10"/></svg>
    </a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
